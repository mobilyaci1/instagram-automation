<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobilya Instagram Automation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .posts-list {
            margin-top: 20px;
        }
        
        .post-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Instagram Automation</h1>
        <p class="subtitle">Mobilya için AI destekli sosyal medya yönetimi</p>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Giriş</div>
            <div class="tab" onclick="showTab('register')">Kayıt</div>
            <div class="tab" onclick="showTab('schedule')">Gönderi Planla</div>
            <div class="tab" onclick="showTab('posts')">Gönderilerim</div>
        </div>
        
        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="ornek@email.com">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="******">
            </div>
            <button onclick="login()">Giriş Yap</button>
            <div id="loginResult"></div>
        </div>
        
        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="regName" placeholder="Adınız Soyadınız">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="ornek@email.com">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="regPassword" placeholder="******">
            </div>
            <button onclick="register()">Kayıt Ol</button>
            <div id="registerResult"></div>
        </div>
        
        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content">
            <div class="form-group">
                <label>Medya Tipi</label>
                <select id="mediaType">
                    <option value="reel">Reels</option>
                    <option value="post">Gönderi</option>
                    <option value="story">Story</option>
                </select>
            </div>
            <div class="form-group">
                <label>Medya URL</label>
                <input type="url" id="mediaUrl" placeholder="https://ornek.com/video.mp4">
            </div>
            <div class="form-group">
                <label>Caption (Boş bırakırsan AI üretir)</label>
                <textarea id="caption" rows="3" placeholder="Açıklama yazın..."></textarea>
            </div>
            <div class="form-group">
                <label>Zaman</label>
                <input type="datetime-local" id="scheduledAt">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="useAI" checked> AI ile caption üret
                </label>
            </div>
            <button onclick="schedulePost()">Gönderi Planla</button>
            <button class="btn-secondary" onclick="generateAI()">🤖 AI Caption Üret</button>
            <div id="scheduleResult"></div>
        </div>
        
        <!-- Posts Tab -->
        <div id="posts" class="tab-content">
            <button onclick="getPosts()">Gönderileri Yenile</button>
            <div id="postsList" class="posts-list"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://instagram-automation-production-a99a.up.railway.app';
        let token = localStorage.getItem('token') || '';

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, fullName: name })
                });
                const data = await res.json();
                
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('registerResult').innerHTML = '<div class="result">✅ Kayıt başarılı!</div>';
                } else {
                    document.getElementById('registerResult').innerHTML = '<div class="result">❌ Hata: ' + (data.error || 'Bilinmeyen hata') + '</div>';
                }
            } catch (err) {
                document.getElementById('registerResult').innerHTML = '<div class="result">❌ Bağlantı hatası</div>';
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('loginResult').innerHTML = '<div class="result">✅ Giriş başarılı!</div>';
                } else {
                    document.getElementById('loginResult').innerHTML = '<div class="result">❌ Hata: ' + (data.error || 'Bilinmeyen hata') + '</div>';
                }
            } catch (err) {
                document.getElementById('loginResult').innerHTML = '<div class="result">❌ Bağlantı hatası</div>';
            }
        }

        async function generateAI() {
            const mediaType = document.getElementById('mediaType').value;
            
            try {
                const res = await fetch(`${API_URL}/api/ai/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ mediaType })
                });
                const data = await res.json();
                
                if (data.caption) {
                    document.getElementById('caption').value = data.caption;
                    document.getElementById('scheduleResult').innerHTML = '<div class="result">✅ AI caption üretildi!</div>';
                }
            } catch (err) {
                document.getElementById('scheduleResult').innerHTML = '<div class="result">❌ Hata</div>';
            }
        }

        async function schedulePost() {
            const mediaType = document.getElementById('mediaType').value;
            const mediaUrl = document.getElementById('mediaUrl').value;
            const caption = document.getElementById('caption').value;
            const scheduledAt = document.getElementById('scheduledAt').value;
            const useAI = document.getElementById('useAI').checked;
            
            try {
                const res = await fetch(`${API_URL}/api/scheduler/schedule`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ mediaType, mediaUrl, caption, scheduledAt, useAI })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('scheduleResult').innerHTML = '<div class="result">✅ Gönderi planlandı! ID: ' + data.post.id + '</div>';
                } else {
                    document.getElementById('scheduleResult').innerHTML = '<div class="result">❌ Hata: ' + (data.error || 'Bilinmeyen hata') + '</div>';
                }
            } catch (err) {
                document.getElementById('scheduleResult').innerHTML = '<div class="result">❌ Bağlantı hatası</div>';
            }
        }

        async function getPosts() {
            try {
                const res = await fetch(`${API_URL}/api/scheduler/posts`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                
                let html = '';
                if (data.posts && data.posts.length > 0) {
                    data.posts.forEach(post => {
                        html += `<div class="post-item">
                            <strong>ID:</strong> ${post.id}<br>
                            <strong>Tip:</strong> ${post.media_type}<br>
                            <strong>Status:</strong> ${post.status}<br>
                            <strong>Zaman:</strong> ${post.scheduled_at}
                        </div>`;
                    });
                } else {
                    html = '<div class="result">Henüz gönderi yok</div>';
                }
                
                document.getElementById('postsList').innerHTML = html;
            } catch (err) {
                document.getElementById('postsList').innerHTML = '<div class="result">❌ Hata</div>';
            }
        }
    </script>
</body>
</html>
